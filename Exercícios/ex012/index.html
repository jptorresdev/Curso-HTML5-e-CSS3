<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>Abaixo você verá um vídeo de uma linda paisagem</p>
    <video width="560" controls loop>
        <source src="midia/paisagem2.mp4" type="video/mp4">
    </video>
    <p>Esse vídeo está hospedado no meu próprio servidor &uparrow;</p>
    
    <h1>Inserindo vídeos do youtube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/_SqC3_B4czc?si=nMFqWKxiSS_TGJxL" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
