<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        * { /*configurações globais das CSS */
            height: 100%;
        } 
        body {
            background-image: linear-gradient(45deg, rgb(243, 225, 66), rgb(180, 39, 122) 50%, rgb(137, 26, 151), rgb(77, 79, 233));
        }
        h1 {
            color: white;
        }
    </style>
</head>
<body>
    <h1>Testando gradiente</h1>    
</body>
</html>
