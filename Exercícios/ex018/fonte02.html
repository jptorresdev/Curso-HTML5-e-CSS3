<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: "bulgia";
            src: url("fontes/Bulgia.otf") format(opentype);
            font-weight: normal;
            font-style: normal;
            /*
                Tipos de format()
                opentype (otf)
                trutype (ttp)
                embed-opentype
                svg
            */
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        h1 {
            font-family: "bulgia";
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Quis cumque, soluta veniam sit omnis distinctio impedit deleniti harum itaque ex quaerat esse commodi iste, blanditiis totam asperiores fuga veritatis dolorem?</p>
    <hr>
    <iframe width="571" height="321" src="https://www.youtube.com/embed/3YIXnxA1kqg" title="Usando fontes externas baixadas - @Curso em Vídeo HTML5 e CSS3" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>    
</body>
</html>
