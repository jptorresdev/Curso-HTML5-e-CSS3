<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
            width: 500px;
        }

        caption {
            font-size: 2em;
        }

        td, th {
            border: 1px solid black;
            padding: 5px 10px;
        }

        col.ColNome {
            background-color: rgb(174, 174, 255);
        }

        col.ColSexo {
            background-color: lightgoldenrodyellow;
        }

        col.ColIdade {
            background-color: rgb(215, 250, 218);
        }

        col.ColProfissao {
            background-color: rgb(255, 209, 209);
        }
    </style>
</head>
<body>
    <h1>Exercício de Tabelas</h1>    

    <table>
        <colgroup>
            <col class="ColNome">
            <col class="ColSexo">
            <col class="ColIdade">
            <col class="ColProfissao">
        </colgroup>
        <caption>Cadastro</caption>
        <thead>
            <tr>
                <th scope="col">Nome</th>
                <th scope="col">Sexo</th>
                <th scope="col">Idade</th>
                <th scope="col">Profissão</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Ana Maria</td>
                <td>F</td>
                <td>25</td>
                <td>Jornalista</td>
            </tr>
            <tr>
                <td>Jonas</td>
                <td>M</td>
                <td>42</td>
                <td>Engenheiro</td>
            </tr>
            <tr>
                <td>Maria</td>
                <td>F</td>
                <td>21</td>
                <td>Professora</td>
            </tr>
            <tr>
                <td>Cláudio</td>
                <td>M</td>
                <td>32</td>
                <td>Programador</td>
            </tr>
            <tr>
                <td>Hélio</td>
                <td>M</td>
                <td>27</td>
                <td>Vendedor</td>
            </tr>
            <tr>
                <td>Cláduia</td>
                <td>F</td>
                <td>29</td>
                <td>Médica</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
