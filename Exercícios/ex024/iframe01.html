<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de iframe</title>
    <style>
        iframe {
            width: 400px;
            height: 400px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h1>Testando o uso do iframe</h1>  
    <!--Tamanho padrao 300x150px-->
    <p>
        Acessando o site do 
        
        <iframe src="https://www.cursoemvideo.com" frameborder="0" scrolling="auto">
            <a href="https://www.cursoemvideo.com" target="_blank">cursoemvideo</a>
        </iframe>
     
        para aprender a programar
    </p>
    <p>
        O repositório do guanabara
        
        <iframe src="https://gustavoguanabara.github.io" frameborder="0">
            <a href="gustavoguanabara.github.io" target="_blank">No github</a>
        </iframe> 
        
        também é muito legal
    </p>
</body>
</html>
